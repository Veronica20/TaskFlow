version: '3.8'

services:
  app:
    build: .
    container_name: taskflow-app
    ports:
      - "7070:7070"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/TaskFlow?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD:
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  db:
    image: mysql:8
    container_name: taskflow-db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: taskflowdb
    ports:
      - "3307:3306"
    volumes:
      - mysqldata:/var/lib/mysql

volumes:
  mysqldata: